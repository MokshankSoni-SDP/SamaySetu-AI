<!DOCTYPE html>
<html lang="gu">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SamaySetu AI — Voice Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+Gujarati:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            /* Light theme color palette */
            --bg-primary: #f5f7ff;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f8f9ff;
            --surface: #ffffff;
            --surface-hover: #f3f5ff;
            --border-light: rgba(79, 70, 229, 0.14);
            --border-medium: rgba(79, 70, 229, 0.22);
            --border-accent: rgba(79, 70, 229, 0.3);

            /* Brand colors */
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent2: #7c3aed;
            --accent-light: #eef2ff;
            --accent-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);

            /* Text colors */
            --text-primary: #1d2452;
            --text-secondary: #4b5563;
            --text-tertiary: #6b7280;
            --text-muted: #9ca3af;

            /* Status colors */
            --success: #16a34a;
            --success-light: #dcfce7;
            --danger: #dc2626;
            --danger-light: #fee2e2;
            --info: #2563eb;
            --info-light: #dbeafe;
            --warning: #f59e0b;
            --warning-light: #fef3c7;

            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-accent: 0 8px 20px rgba(79, 70, 229, 0.25);

            /* Layout */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;

            /* Fonts */
            --font-display: 'Cinzel', serif;
            --font-body: 'Noto Sans Gujarati', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(79, 70, 229, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
        }

        /* ── Layout ── */
        .app {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            gap: 0;
        }

        /* ── Header ── */
        header {
            grid-column: 1/-1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-light);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-mark {
            width: 48px;
            height: 48px;
            background: var(--accent-gradient);
            border-radius: var(--radius-md);
            display: grid;
            place-items: center;
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            box-shadow: var(--shadow-accent);
        }

        .logo-text h1 {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .logo-text span {
            font-size: 11px;
            color: var(--text-tertiary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.3s ease;
        }

        .status-dot.live {
            background: var(--success);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.2);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.7;
                transform: scale(1.1);
            }
        }

        /* ── Left sidebar ── */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-light);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            min-height: 0;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--border-medium);
            border-radius: 10px;
        }

        .panel-title {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .user-card {
            background: var(--accent-light);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .user-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent-gradient);
            color: #ffffff;
            display: grid;
            place-items: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            box-shadow: var(--shadow-md);
        }

        .user-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .user-phone {
            font-size: 13px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
        }

        /* Quick stats */
        .quick-stats {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .stat-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Appointments list */
        .appointments-section {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .appointments-header {
            padding: 16px 20px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .appointments-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .appt-list {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 320px;
            overflow-y: auto;
        }

        .appt-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 12px;
            padding: 12px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            align-items: center;
        }

        .appt-item:hover {
            background: var(--surface-hover);
            border-color: var(--border-medium);
            transform: translateX(2px);
        }

        .appt-time {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            font-family: var(--font-mono);
        }

        .appt-date {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .tag {
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .tag.booked {
            background: var(--info-light);
            color: var(--info);
        }

        .tag.confirmed {
            background: var(--success-light);
            color: var(--success);
        }

        .tag.cancelled {
            background: var(--danger-light);
            color: var(--danger);
        }

        .tag.pending {
            background: var(--warning-light);
            color: var(--warning);
        }

        /* ── Main content area ── */
        .main-content {
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
        }

        /* Chat area */
        .chat-section {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chat-section::-webkit-scrollbar {
            width: 8px;
        }

        .chat-section::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-section::-webkit-scrollbar-thumb {
            background: var(--border-medium);
            border-radius: 10px;
        }

        #chatMessages {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-empty-state {
            align-self: center;
            width: 100%;
            max-width: 620px;
            padding: 20px 22px;
            border: 1px dashed var(--border-medium);
            border-radius: var(--radius-lg);
            background: linear-gradient(180deg, #ffffff 0%, #fffaf2 100%);
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .chat-bubble {
            max-width: 70%;
            padding: 16px 20px;
            border-radius: var(--radius-lg);
            font-size: 15px;
            line-height: 1.6;
            box-shadow: var(--shadow-sm);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-bubble.user {
            align-self: flex-end;
            background: var(--accent-gradient);
            color: #ffffff;
            border-bottom-right-radius: 6px;
        }

        .chat-bubble.bot {
            align-self: flex-start;
            background: var(--surface);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            border-bottom-left-radius: 6px;
        }

        .msg-time {
            font-size: 11px;
            margin-top: 6px;
            opacity: 0.7;
            font-family: var(--font-mono);
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            max-width: 70px;
            box-shadow: var(--shadow-sm);
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-tertiary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }

            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* ── Voice control area ── */
        .voice-control {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-light);
            padding: 16px 20px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        /* Pulse rings */
        .pulse-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: grid;
            place-items: center;
        }

        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0;
            pointer-events: none;
        }

        .pulse-container.active .pulse-ring {
            animation: pulse-wave 2s ease-out infinite;
        }

        .pulse-ring:nth-child(1) {
            animation-delay: 0s;
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 0.5s;
        }

        .pulse-ring:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes pulse-wave {
            0% {
                width: 100px;
                height: 100px;
                opacity: 0.8;
            }

            100% {
                width: 200px;
                height: 200px;
                opacity: 0;
            }
        }

        /* Mic button */
        .mic-button {
            position: relative;
            z-index: 2;
            width: 88px;
            height: 88px;
            border: none;
            border-radius: 50%;
            background: var(--accent-gradient);
            color: #ffffff;
            cursor: pointer;
            box-shadow: var(--shadow-xl);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: grid;
            place-items: center;
        }

        .mic-button:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-accent);
        }

        .mic-button:active {
            transform: scale(0.95);
        }

        .mic-button.listening {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
            animation: pulse-button 1.5s ease-in-out infinite;
        }

        @keyframes pulse-button {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .mic-icon {
            width: 36px;
            height: 36px;
        }

        /* Status text */
        .status-text {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .status-text.active {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* Waveform visualization */
        #waveCanvas {
            width: 100%;
            max-width: 400px;
            height: 0;
            opacity: 0;
            transition: opacity 0.3s ease, height 0.2s ease;
        }

        #waveCanvas.active {
            opacity: 1;
            height: 44px;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            padding: 10px 20px;
            border: 1px solid var(--border-medium);
            background: var(--surface);
            color: var(--text-secondary);
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--accent);
        }

        .action-btn.danger:hover {
            background: var(--danger-light);
            color: var(--danger);
            border-color: var(--danger);
        }

        /* Login overlay */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(250, 250, 250, 0.98);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .login-overlay.hidden {
            display: none;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: 48px;
            max-width: 480px;
            width: 100%;
            box-shadow: var(--shadow-xl);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header .logo-mark {
            margin: 0 auto 20px;
        }

        .login-header h2 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-family: var(--font-display);
        }

        .login-header p {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-family: var(--font-body);
            background: var(--surface);
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            color: #ffffff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-accent);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 320px;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-color: var(--success);
            background: var(--success-light);
        }

        .toast.error {
            border-color: var(--danger);
            background: var(--danger-light);
        }

        .toast.info {
            border-color: var(--info);
            background: var(--info-light);
        }

        /* User badge in header */
        #userBadge {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: var(--accent-light);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 500;
        }

        #logoutBtn {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #logoutBtn:hover {
            background: var(--danger-light);
            color: var(--danger);
            border-color: var(--danger);
        }

        /* Responsive design */
        @media (max-width: 1024px) {
            .app {
                grid-template-columns: 280px 1fr;
            }
        }

        @media (max-width: 768px) {
            .app {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            header {
                padding: 16px 20px;
            }

            .chat-section {
                padding: 20px 16px;
            }

            .chat-bubble {
                max-width: 85%;
            }

            .voice-control {
                padding: 24px 16px;
            }

            .login-card {
                padding: 32px 24px;
            }
        }

        /* Utility classes */
        .hidden {
            display: none !important;
        }

        .scroll-reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <!-- Login overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-mark" id="loginLogoMark">સ</div>
                <h2 id="loginBotName">Welcome to SamaySetu</h2>
                <p id="loginBotDesc">Voice-powered appointment booking assistant</p>
            </div>
            <form onsubmit="event.preventDefault(); doLogin();">
                <div class="input-group">
                    <label for="loginPhone">Phone Number</label>
                    <input type="tel" id="loginPhone" placeholder="+91 98765 43210" required />
                </div>
                <div class="input-group">
                    <label for="loginName">Name (Optional)</label>
                    <input type="text" id="loginName" placeholder="Your name" />
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    → Continue to Voice Assistant
                </button>
            </form>
        </div>
    </div>

    <script>
        // ── Configuration ─────────────────────────────────────────────────────────────
        const WS_URL = window.location.protocol === 'https:'
            ? `wss://${window.location.host}/ws/voice`
            : `ws://${window.location.host}/ws/voice`;

        const pageParams = new URLSearchParams(window.location.search);
        const TENANT_ID = pageParams.get('tenant_id') || pageParams.get('tenant') || null;

        const settings = {
            sampleRate: 16000,
            channels: 1,
            bitDepth: 16
        };

        // ── State ─────────────────────────────────────────────────────────────────────
        let socket = null;
        let audioContext = null;
        let processor = null;
        let isListening = false;
        let isConnected = false;
        let aiSpeaking = false;
        let loggedInUserPhone = null;
        let apptRefreshInterval = null;
        let currentResponseId = 0;
        let packetCount = 0;
        let silenceTimer = null;
        let lastPartialTranscript = '';
        let silenceTimeoutMs = 1500;

        // Audio playback state
        let audioQueue = [];
        let isPlayingAudio = false;
        let mediaSource = null;
        let sourceBuffer = null;
        let audioElement = null;
        let responseFinished = false;
        let msDestroy = null;
        let msChunkQueue = [];
        let msAppending = false;
        let msTtsDone = false;
        let ttsDoneReceived = false;

        // DOM elements
        const chatMessages = document.getElementById('chatMessages');
        const chatArea = document.getElementById('chatArea');
        const micButton = document.getElementById('micButton');
        const statusText = document.getElementById('statusText');
        const pulseContainer = document.getElementById('pulseContainer');
        const connectionStatus = document.getElementById('connectionStatus');
        const connectionText = document.getElementById('connectionText');
        const apptListEl = document.getElementById('apptList');
        const waveCanvas = document.getElementById('waveCanvas');
        const waveCtx = waveCanvas.getContext('2d');

        // ── Utility functions ─────────────────────────────────────────────────────────
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    ${type === 'success' ? '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' : ''}
                    ${type === 'error' ? '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>' : ''}
                    ${type === 'info' ? '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>' : ''}
                </svg>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function setStatus(text, isActive) {
            statusText.textContent = text;
            statusText.classList.toggle('active', isActive);
        }

        function setConnected(connected) {
            isConnected = connected;
            connectionStatus.classList.toggle('live', connected);
            connectionText.textContent = connected ? 'Connected' : 'Disconnected';
        }

        function renderChatEmptyState() {
            if (chatMessages.children.length > 0) return;
            const empty = document.createElement('div');
            empty.className = 'chat-empty-state';
            empty.textContent = 'Start by tapping the mic and speaking naturally. You can say things like: book appointment tomorrow at 11 AM.';
            chatMessages.appendChild(empty);
        }

        function setMicMuteUI(muted) {
            if (muted) {
                waveCanvas.classList.remove('active');
            } else if (isListening) {
                waveCanvas.classList.add('active');
            }
        }

        function cancelSilenceTimer() {
            if (silenceTimer) {
                clearTimeout(silenceTimer);
                silenceTimer = null;
            }
        }

        function commitTranscript(text) {
            const clean = (text || '').trim();
            if (!clean || aiSpeaking || !socket || socket.readyState !== WebSocket.OPEN) return;
            addMessage(clean, true);
            socket.send(JSON.stringify({ type: 'commit_transcript', text: clean }));
        }

        function startSilenceTimer() {
            cancelSilenceTimer();
            if (!lastPartialTranscript.trim()) return;
            silenceTimer = setTimeout(() => {
                const text = lastPartialTranscript.trim();
                lastPartialTranscript = '';
                cancelSilenceTimer();
                commitTranscript(text);
            }, silenceTimeoutMs);
        }

        // ── Chat functions ────────────────────────────────────────────────────────────
        function addMessage(text, isUser = false) {
            const oldEmpty = chatMessages.querySelector('.chat-empty-state');
            if (oldEmpty) oldEmpty.remove();

            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${isUser ? 'user' : 'bot'}`;

            const msgText = document.createElement('div');
            msgText.textContent = text;
            bubble.appendChild(msgText);

            const time = document.createElement('div');
            time.className = 'msg-time';
            time.textContent = new Date().toLocaleTimeString('en-IN', {
                hour: '2-digit',
                minute: '2-digit'
            });
            bubble.appendChild(time);

            chatMessages.appendChild(bubble);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function clearChat() {
            chatMessages.innerHTML = '';
            renderChatEmptyState();
            showToast('Chat cleared', 'info');
        }

        // ── WebSocket functions ───────────────────────────────────────────────────────
        function connectWebSocket() {
            if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
                return;
            }

            const url = TENANT_ID ? `${WS_URL}?tenant_id=${TENANT_ID}` : WS_URL;
            socket = new WebSocket(url);
            socket.binaryType = 'arraybuffer';

            socket.onopen = () => {
                console.log('WebSocket connected');
                setConnected(true);
                showToast('Connected to voice assistant', 'success');

                // Explicitly initialize backend session context for tenant/user.
                socket.send(JSON.stringify({
                    type: 'init',
                    phone_number: loggedInUserPhone,
                    tenant_id: TENANT_ID
                }));
            };

            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    console.log('Message:', data.type);

                    if (data.type === 'transcript') {
                        const transcriptText = (data.text || '').trim();
                        if (!transcriptText) {
                            return;
                        }

                        if (data.is_final) {
                            lastPartialTranscript = '';
                            cancelSilenceTimer();
                            commitTranscript(transcriptText);
                        } else {
                            lastPartialTranscript = transcriptText;
                            startSilenceTimer();
                        }
                    }

                    if (data.type === 'ai_text' && data.text) {
                        addMessage(data.text, false);
                    }

                    if (data.type === 'ai_speaking_start') {
                        currentResponseId++;
                        clearAudioQueue();
                        aiSpeaking = true;
                        cancelSilenceTimer();
                        lastPartialTranscript = '';
                        setMicMuteUI(true);
                        msInit(currentResponseId);
                    }

                    if (data.type === 'audio_chunk') {
                        enqueueChunk(data.audio, data.index, data.audio_format || 'wav');
                    }

                    if (data.type === 'tts_done') {
                        console.debug('[TTS] tts_done');
                        onTtsDone(data.response_id || currentResponseId);
                    }

                    if (data.type === 'stt_ready' && data.reconnect_num > 0) {
                        showToast('Voice recognition reconnected ✓', 'success');
                    }

                    if (data.type === 'stt_failed') {
                        setStatus('Voice recognition failed', false);
                        showToast('Voice recognition failed.', 'error');
                    }

                    if (data.type === 'tool_call' && data.status === 'ok') {
                        const bookedOk = (
                            data.name === 'book_appointment' &&
                            ((data.result_obj && data.result_obj.status === 'SUCCESS') ||
                                (data.result && data.result.includes('SUCCESS')))
                        );
                        if (bookedOk) {
                            setTimeout(loadAppointments, 2000);
                        }
                    }
                } catch (e) {
                    console.error('Error parsing message:', e);
                }
            };

            socket.onclose = () => {
                setConnected(false);
                socket = null;
                if (isListening) setStatus('Disconnected', false);
            };

            socket.onerror = () => {
                showToast('Connection error', 'error');
            };
        }

        // ── Audio functions ───────────────────────────────────────────────────────────
        async function initAudio() {
            setStatus('Requesting microphone...', true);
            let stream;
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: settings.sampleRate,
                        channelCount: 1,
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                });
            } catch (e) {
                showToast('Microphone access denied', 'error');
                stopMic();
                return;
            }

            audioContext = new AudioContext({ sampleRate: settings.sampleRate });
            const source = audioContext.createMediaStreamSource(stream);
            const analyser = startWaveform();
            processor = audioContext.createScriptProcessor(4096, 1, 1);

            source.connect(analyser);
            analyser.connect(processor);
            processor.connect(audioContext.destination);

            processor.onaudioprocess = (e) => {
                if (aiSpeaking || !socket || socket.readyState !== WebSocket.OPEN) return;

                const inputData = e.inputBuffer.getChannelData(0);
                const pcmData = new Int16Array(inputData.length);

                for (let i = 0; i < inputData.length; i++) {
                    pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                }

                socket.send(pcmData.buffer);
                packetCount++;
            };

            setStatus('Listening...', true);
        }

        function stopMic() {
            if (processor) {
                processor.disconnect();
                processor = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            isListening = false;
            micButton.classList.remove('listening');
            pulseContainer.classList.remove('active');
            waveCanvas.classList.remove('active');
            setStatus('Tap to speak', false);
            cancelSilenceTimer();
            lastPartialTranscript = '';
        }

        function toggleMic() {
            if (!loggedInUserPhone) {
                showToast('Please login first', 'error');
                return;
            }

            if (isListening) {
                stopMic();
                if (socket) socket.send(JSON.stringify({ type: 'stop_listening' }));
            } else {
                if (!socket || socket.readyState !== WebSocket.OPEN) {
                    connectWebSocket();
                    setTimeout(() => {
                        if (socket && socket.readyState === WebSocket.OPEN) {
                            startMic();
                        } else {
                            setStatus('Unable to connect. Check server.', false);
                        }
                    }, 500);
                } else {
                    startMic();
                }
            }
        }

        function startMic() {
            isListening = true;
            micButton.classList.add('listening');
            pulseContainer.classList.add('active');
            waveCanvas.classList.add('active');
            initAudio();
        }

        // ── Waveform visualization ────────────────────────────────────────────────────
        function startWaveform() {
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                if (!isListening) return;
                requestAnimationFrame(draw);

                analyser.getByteFrequencyData(dataArray);

                waveCtx.fillStyle = 'rgb(250, 250, 250)';
                waveCtx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);

                const barWidth = (waveCanvas.width / bufferLength) * 2.5;
                let barHeight;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    barHeight = (dataArray[i] / 255) * waveCanvas.height * 0.8;

                    const gradient = waveCtx.createLinearGradient(0, 0, 0, waveCanvas.height);
                    gradient.addColorStop(0, '#f5a623');
                    gradient.addColorStop(1, '#e05c2a');

                    waveCtx.fillStyle = gradient;
                    waveCtx.fillRect(x, waveCanvas.height - barHeight, barWidth, barHeight);

                    x += barWidth + 1;
                }
            }

            draw();
            return analyser;
        }

        function drawIdleWave() {
            waveCanvas.width = waveCanvas.offsetWidth;
            waveCanvas.height = 60;
            waveCtx.fillStyle = 'rgb(250, 250, 250)';
            waveCtx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);
        }

        // ── Audio playback (MediaSource) ──────────────────────────────────────────────
        function msInit(respId) {
            if (mediaSource && !mediaSource.readyState.includes('closed')) {
                if (msDestroy) msDestroy();
            }

            audioElement = new Audio();
            mediaSource = new MediaSource();
            audioElement.src = URL.createObjectURL(mediaSource);
            msChunkQueue = [];
            msAppending = false;
            msTtsDone = false;

            mediaSource.addEventListener('sourceopen', () => {
                if (!mediaSource.sourceBuffers.length) {
                    sourceBuffer = mediaSource.addSourceBuffer('audio/mpeg');
                    sourceBuffer.mode = 'sequence';
                    sourceBuffer.addEventListener('updateend', () => {
                        msAppending = false;
                        msDrainQueue();
                    });
                    msDrainQueue();
                }
            });

            audioElement.onended = () => {
                aiSpeaking = false;
                setMicMuteUI(false);
            };

            audioElement.onerror = () => {
                aiSpeaking = false;
                setMicMuteUI(false);
            };

            audioElement.play().catch(() => { });

            msDestroy = () => {
                try {
                    if (audioElement) {
                        audioElement.pause();
                        audioElement.src = '';
                    }
                    if (mediaSource && mediaSource.readyState === 'open') {
                        mediaSource.endOfStream();
                    }
                } catch (e) { }
                audioElement = null;
                mediaSource = null;
                sourceBuffer = null;
                msChunkQueue = [];
                msAppending = false;
                msTtsDone = false;
            };
        }

        function msDrainQueue() {
            if (!sourceBuffer || sourceBuffer.updating || msAppending) return;

            if (msChunkQueue.length > 0) {
                msAppending = true;
                sourceBuffer.appendBuffer(msChunkQueue.shift());
                return;
            }

            if (msTtsDone && mediaSource && mediaSource.readyState === 'open') {
                try {
                    mediaSource.endOfStream();
                } catch (e) {
                    console.warn('endOfStream error', e);
                }
            }
        }

        function enqueueChunk(base64Audio, index, format) {
            if (format === 'mp3') {
                const binary = atob(base64Audio);
                const len = binary.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
                msChunkQueue.push(bytes);
                msDrainQueue();
                return;
            }

            if (format === 'wav') {
                const binary = atob(base64Audio);
                const len = binary.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
                const blob = new Blob([bytes], { type: 'audio/wav' });
                audioQueue.push(URL.createObjectURL(blob));
                if (!isPlayingAudio) {
                    playNextAudioChunk();
                }
            }
        }

        function playNextAudioChunk() {
            if (!audioQueue.length) {
                isPlayingAudio = false;
                if (ttsDoneReceived) {
                    ttsDoneReceived = false;
                    aiSpeaking = false;
                    setMicMuteUI(false);
                }
                return;
            }

            isPlayingAudio = true;
            const nextUrl = audioQueue.shift();
            const wavAudio = new Audio(nextUrl);
            wavAudio.onended = () => {
                URL.revokeObjectURL(nextUrl);
                playNextAudioChunk();
            };
            wavAudio.onerror = () => {
                URL.revokeObjectURL(nextUrl);
                playNextAudioChunk();
            };
            wavAudio.play().catch(() => {
                URL.revokeObjectURL(nextUrl);
                playNextAudioChunk();
            });
        }

        function onTtsDone(respId) {
            responseFinished = true;

            if (sourceBuffer || mediaSource) {
                msTtsDone = true;
                msDrainQueue();
                return;
            }

            if (audioQueue.length > 0 || isPlayingAudio) {
                ttsDoneReceived = true;
            } else {
                aiSpeaking = false;
                setMicMuteUI(false);
            }
        }

        function clearAudioQueue() {
            audioQueue = [];
            isPlayingAudio = false;
            responseFinished = false;
            ttsDoneReceived = false;
            if (msDestroy) {
                msDestroy();
                msDestroy = null;
            }
        }

        // ── Appointments ──────────────────────────────────────────────────────────────
        async function loadAppointments() {
            if (!loggedInUserPhone) return;
            try {
                const url = `/appointments/${loggedInUserPhone}` +
                    (TENANT_ID ? `?tenant_id=${TENANT_ID}` : '');
                const r = await fetch(url);
                const appts = await r.json();
                renderAppointments(appts);
                updateStats(appts);
            } catch (e) {
                console.error('Error loading appointments:', e);
            }
        }

        function renderAppointments(appts) {
            if (!appts || appts.length === 0) {
                apptListEl.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:12px;">No appointments yet.</div>';
                return;
            }

            apptListEl.innerHTML = appts.slice(0, 5).map(a => {
                const dt = new Date(a.start_time);
                const dateStr = dt.toLocaleDateString('en-IN', {
                    day: 'numeric',
                    month: 'short'
                });
                const timeStr = dt.toLocaleTimeString('en-IN', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                const tagCls = (a.status || 'BOOKED').toLowerCase();

                return `
                    <div class="appt-item">
                        <div class="appt-time">${timeStr}</div>
                        <div class="appt-date">${dateStr}</div>
                        <span class="tag ${tagCls}">${a.status || 'BOOKED'}</span>
                    </div>
                `;
            }).join('');
        }

        function updateStats(appts) {
            if (!appts) return;

            const total = appts.length;
            const now = new Date();
            const thisMonth = appts.filter(a => {
                const dt = new Date(a.start_time);
                return dt.getMonth() === now.getMonth() &&
                    dt.getFullYear() === now.getFullYear();
            }).length;
            const upcoming = appts.filter(a => new Date(a.start_time) > now).length;

            document.getElementById('totalBookings').textContent = total;
            document.getElementById('monthBookings').textContent = thisMonth;
            document.getElementById('upcomingBookings').textContent = upcoming;
        }

        function startAppointmentRefresh() {
            loadAppointments();
            if (apptRefreshInterval) clearInterval(apptRefreshInterval);
            apptRefreshInterval = setInterval(loadAppointments, 30000);
        }

        function stopAppointmentRefresh() {
            if (apptRefreshInterval) {
                clearInterval(apptRefreshInterval);
                apptRefreshInterval = null;
            }
        }

        // ── Login functions ───────────────────────────────────────────────────────────
        async function doLogin() {
            const phone = document.getElementById('loginPhone').value.trim();
            const name = document.getElementById('loginName').value.trim();

            if (!phone) {
                showToast('Phone number required.', 'error');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Connecting…';

            try {
                const r = await fetch('/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone_number: phone,
                        name: name || null,
                        tenant_id: TENANT_ID
                    })
                });

                if (!r.ok) {
                    const err = await r.json().catch(() => ({}));
                    throw new Error(err.detail || 'Server error');
                }

                localStorage.setItem('phone_number', phone);
                if (name) localStorage.setItem('user_name', name);

                loggedInUserPhone = phone;
                renderUserBadge(phone, name);

                document.getElementById('loginOverlay').classList.add('hidden');
                showToast(`Welcome! 📞 ${phone}`, 'success');

                startAppointmentRefresh();
            } catch (e) {
                showToast(`Login failed: ${e.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '→ Continue to Voice Assistant';
            }
        }

        function doLogout() {
            localStorage.removeItem('phone_number');
            localStorage.removeItem('user_name');
            loggedInUserPhone = null;

            document.getElementById('userBadge').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'none';

            stopAppointmentRefresh();

            if (socket) socket.close();
            stopMic();
            clearChat();

            document.getElementById('loginOverlay').classList.remove('hidden');
        }

        function renderUserBadge(phone, name) {
            document.getElementById('userPhoneLabel').textContent = phone;
            document.getElementById('userBadge').style.display = 'flex';
            document.getElementById('logoutBtn').style.display = 'flex';
            document.getElementById('sideUserName').textContent = name || 'User';
            document.getElementById('sideUserPhone').textContent = phone;

            const initials = (name || phone).charAt(0).toUpperCase();
            document.getElementById('userAvatar').textContent = initials;
        }

        function checkLoginStatus() {
            localStorage.removeItem('phone_number');
            localStorage.removeItem('user_name');
            document.getElementById('loginOverlay').classList.remove('hidden');
            renderChatEmptyState();
        }

        function resetSession() {
            if (socket) socket.close();
            stopMic();
            clearAudioQueue();
            clearChat();
            showToast('Session reset', 'success');
        }

        // ── Tenant branding ───────────────────────────────────────────────────────────
        async function loadBotConfig() {
            if (!TENANT_ID) return;
            try {
                const r = await fetch(`/public/bot-config?tenant_id=${encodeURIComponent(TENANT_ID)}`);
                if (!r.ok) return;
                const config = await r.json();

                if (config.bot_name) {
                    const clinicName = config.bot_name.trim();
                    document.title = `${clinicName} - Voice Booking`;
                    document.getElementById('headerBotName').textContent = clinicName;
                    document.getElementById('loginBotName').textContent = `Welcome to ${clinicName}`;

                    const logoGlyph = clinicName.charAt(0).toUpperCase() || 'S';
                    document.getElementById('headerLogoMark').textContent = logoGlyph;
                    document.getElementById('loginLogoMark').textContent = logoGlyph;
                }

                if (config.business_description && config.business_description.trim()) {
                    const desc = config.business_description.trim();
                    document.getElementById('headerBotDesc').textContent = desc;
                    document.getElementById('loginBotDesc').textContent = desc;
                }

                if (config.silence_timeout_ms) {
                    silenceTimeoutMs = Number(config.silence_timeout_ms) || silenceTimeoutMs;
                }
            } catch (e) {
                console.error('Error loading bot config:', e);
            }
        }

        // ── Initialization ────────────────────────────────────────────────────────────
        window.addEventListener('load', () => {
            drawIdleWave();
            loadBotConfig();
            checkLoginStatus();
            setConnected(false);
        });

        // Scroll reveal animations
        const revealObs = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (!entry.isIntersecting) return;
                entry.target.classList.add('visible');
                revealObs.unobserve(entry.target);
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.scroll-reveal').forEach((node) => {
            revealObs.observe(node);
        });
    </script>
</body>

</html>
